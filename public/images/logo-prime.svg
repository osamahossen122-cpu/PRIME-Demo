  <!-- PRIME text -->
  <text x="200" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="62" fill="#1A2744" letter-spacing="8">PRIME</text>

  <!-- GMBH text -->
  <text x="200" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="24" fill="#8896A6" letter-spacing="12">GMBH</text>

  <!-- Left line -->
