<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <defs>
    <clipPath id="mark-clip">
      <path d="M200 20 L360 110 L360 280 L200 370 L40 280 L40 110 Z"/>
    </clipPath>
  </defs>

  <!-- Outer hexagon - dark navy -->
  <path d="M200 20 L360 110 L360 280 L200 370 L40 280 L40 110 Z" fill="#1A2744"/>

  <!-- Left P - medium blue -->
